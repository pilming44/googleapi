spring.application.name=ytclassifier

# --- H2 (인메모리) ---
# DB_CLOSE_DELAY=-1 : JVM 살아있는 동안 DB 유지(커넥션 종료에도 초기화 방지). 단, 앱 재시작 시에는 초기화됨.
# 추후 영속화: jdbc:h2:file:./data/ytdb 로 변경(코드 동일). 실DB 전환 시 ddl-auto=validate + Flyway 권장.
spring.datasource.url=jdbc:h2:mem:ytdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# H2 웹 콘솔: http://localhost:8080/h2-console (JDBC URL은 위와 동일하게 입력)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# 뷰 렌더 중 지연로딩 방지(카드 목록은 projection으로 조회). LazyInitialization이 보이면 엔티티를 템플릿에 직접 쓴 것.
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- YouTube API ---
# (선택) 검색 폼의 API Key 기본값을 프리필하려면 아래 주석을 해제해 키를 넣는다. 커밋/공유 금지.
# youtube.api.key=

# --- 수집 상한(안전값, 자유롭게 조정) ---
# 한 번의 검색에서 모을 목표 건수 상한. (참고: 기본 일일 쿼터로 하루 ~5,000건이 한계)
youtube.collect.max-target=5000
# 한 번의 검색에서 허용하는 search.list 호출 수 상한(쿼터 = 호출수 * 100유닛). 100이면 기본 일일 쿼터 전체.
youtube.collect.max-api-calls=100
# 우선 수집 채널의 uploads playlist 조회 호출 상한(playlistItems.list는 호출당 1유닛).
youtube.collect.max-channel-api-calls=1000
